services:
  app:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.dev
    volumes:
      - ..:/app # live source
      - backend_venv:/app/.venv # preserve installed packages
    environment:
      - WATCHFILES_FORCE_POLLING=true # polling required on macOS Docker Desktop

  frontend:
    build:
      context: ../ui
      dockerfile: Dockerfile.dev
    volumes:
      - ../ui:/app # live source
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next # incremental build cache
    environment:
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true

volumes:
  backend_venv:
  frontend_node_modules:
  frontend_next:
