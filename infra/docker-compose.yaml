services:
  db:
    image: pgvector/pgvector:pg17
    container_name: finance-rag
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bakeryuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bakerypass}
      POSTGRES_DB: ${POSTGRES_DB:-bakerydb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d
    ports:
      - "5434:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-bakeryuser} -d ${POSTGRES_DB:-bakerydb}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  langfuse-db:
    image: pgvector/pgvector:pg17
    container_name: bakery-os-langfuse-db
    restart: always
    environment:
      POSTGRES_USER: ${LANGFUSE_POSTGRES_USER:-langfuse}
      POSTGRES_PASSWORD: ${LANGFUSE_POSTGRES_PASSWORD:-langfusepass}
      POSTGRES_DB: ${LANGFUSE_POSTGRES_DB:-langfuse}
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${LANGFUSE_POSTGRES_USER:-langfuse} -d ${LANGFUSE_POSTGRES_DB:-langfuse}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile
    container_name: finance-rag-backend
    restart: always
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-bakeryuser}:${POSTGRES_PASSWORD:-bakerypass}@db:5432/${POSTGRES_DB:-bakerydb}
      # Inside the container, localhost is the container itself — reach Langfuse via
      # its compose service name on the shared network, NOT the host's localhost:3030.
      - LANGFUSE_BASE_URL=http://langfuse-web:3000
      - LANGFUSE_HOST=http://langfuse-web:3000
    ports:
      - "0.0.0.0:8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../ui
      dockerfile: Dockerfile
    container_name: finance-rag-frontend
    restart: always
    environment:
      - API_URL=http://app:8000
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "0.0.0.0:3000:3000"
    depends_on:
      - app
    healthcheck:
      # node:slim ships without curl/wget; use Node's built-in fetch instead.
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  clickhouse:
    image: clickhouse/clickhouse-server
    container_name: bakery-os-clickhouse
    restart: always
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clickhouse}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 1s

  redis:
    image: redis:7
    container_name: bakery-os-redis
    restart: always
    command: >
      --requirepass ${REDIS_AUTH:-myredissecret}
      --maxmemory-policy noeviction
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_AUTH:-myredissecret}", "ping"]
      interval: 3s
      timeout: 10s
      retries: 10

  langfuse-web:
    image: langfuse/langfuse:3
    container_name: bakery-os-langfuse-web
    restart: always
    depends_on:
      langfuse-db:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3030:3000"
    env_file:
      - ../.env
    environment: &langfuse-env
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${LANGFUSE_POSTGRES_USER:-langfuse}:${LANGFUSE_POSTGRES_PASSWORD:-langfusepass}@langfuse-db:5432/${LANGFUSE_POSTGRES_DB:-langfuse}
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_MIGRATION_URL=clickhouse://clickhouse:9000
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-clickhouse}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-clickhouse}
      - CLICKHOUSE_CLUSTER_ENABLED=false
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_AUTH=${REDIS_AUTH:-myredissecret}
      - LANGFUSE_S3_EVENT_UPLOAD_BUCKET=langfuse
      - LANGFUSE_S3_EVENT_UPLOAD_REGION=auto
      - LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minio}
      - LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-miniosecret}
      - LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT=http://minio:9000
      - LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE=true
      - LANGFUSE_S3_EVENT_UPLOAD_PREFIX=events/
      - LANGFUSE_S3_MEDIA_UPLOAD_BUCKET=langfuse
      - LANGFUSE_S3_MEDIA_UPLOAD_REGION=auto
      - LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minio}
      - LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-miniosecret}
      - LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT=http://localhost:9090
      - LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE=true
      - LANGFUSE_S3_MEDIA_UPLOAD_PREFIX=media/
      - LANGFUSE_S3_BATCH_EXPORT_ENABLED=false
      - LANGFUSE_S3_BATCH_EXPORT_BUCKET=langfuse
      - LANGFUSE_S3_BATCH_EXPORT_PREFIX=exports/
      - LANGFUSE_S3_BATCH_EXPORT_REGION=auto
      - LANGFUSE_S3_BATCH_EXPORT_ENDPOINT=http://minio:9000
      - LANGFUSE_S3_BATCH_EXPORT_EXTERNAL_ENDPOINT=http://localhost:9090
      - LANGFUSE_S3_BATCH_EXPORT_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minio}
      - LANGFUSE_S3_BATCH_EXPORT_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-miniosecret}
      - LANGFUSE_S3_BATCH_EXPORT_FORCE_PATH_STYLE=true
      - LANGFUSE_WORKER_HOST=langfuse-worker

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    container_name: bakery-os-langfuse-worker
    restart: always
    depends_on:
      langfuse-db:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - ../.env
    environment: *langfuse-env

  # S3-compatible blob storage for Langfuse event/media uploads. The langfuse-web
  # and -worker services reference it as host "minio" (see LANGFUSE_S3_*_ENDPOINT
  # above); without it, trace ingestion fails with "getaddrinfo ENOTFOUND minio".
  # The entrypoint pre-creates the "langfuse" bucket (path-style) on first boot.
  minio:
    image: minio/minio
    container_name: bakery-os-minio
    restart: always
    entrypoint: sh
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniosecret}
    ports:
      - "9090:9000"   # API — matches LANGFUSE_S3_*_EXTERNAL_ENDPOINT=http://localhost:9090
      - "9091:9001"   # web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  langfuse_postgres_data:
  clickhouse_data:
  clickhouse_logs:
  redis_data:
  minio_data:
