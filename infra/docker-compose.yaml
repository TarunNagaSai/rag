services:
  db:
    image: pgvector/pgvector:pg17
    container_name: finance-rag
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bakeryuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bakerypass}
      POSTGRES_DB: ${POSTGRES_DB:-bakerydb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-bakeryuser} -d ${POSTGRES_DB:-bakerydb}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile
    container_name: finance-rag-backend
    restart: always
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-bakeryuser}:${POSTGRES_PASSWORD:-bakerypass}@db:5432/${POSTGRES_DB:-bakerydb}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../ui
      dockerfile: Dockerfile
    container_name: finance-rag-frontend
    restart: always
    environment:
      - API_URL=http://app:8000
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - app
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:3000/api/health && wget -qO- http://localhost:3000 > /dev/null",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  clickhouse:
    image: clickhouse/clickhouse-server
    container_name: bakery-os-clickhouse
    restart: always
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clickhouse}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 1s

  redis:
    image: redis:7
    container_name: bakery-os-redis
    restart: always
    command: >
      --requirepass ${REDIS_AUTH:-myredissecret}
      --maxmemory-policy noeviction
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_AUTH:-myredissecret}", "ping"]
      interval: 3s
      timeout: 10s
      retries: 10

  langfuse-web:
    image: langfuse/langfuse:3
    container_name: bakery-os-langfuse-web
    restart: always
    depends_on:
      db:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3030:3000"
    env_file:
      - ../.env
    environment: &langfuse-env
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-bakeryuser}:${POSTGRES_PASSWORD:-bakerypass}@db:5432/langfusedb
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_MIGRATION_URL=clickhouse://clickhouse:9000
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-clickhouse}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-clickhouse}
      - CLICKHOUSE_CLUSTER_ENABLED=false
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_AUTH=${REDIS_AUTH:-myredissecret}
      - LANGFUSE_S3_EVENT_UPLOAD_BUCKET=langfuse
      - LANGFUSE_S3_EVENT_UPLOAD_REGION=auto
      - LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minio}
      - LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-miniosecret}
      - LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT=http://minio:9000
      - LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE=true
      - LANGFUSE_S3_EVENT_UPLOAD_PREFIX=events/
      - LANGFUSE_S3_MEDIA_UPLOAD_BUCKET=langfuse
      - LANGFUSE_S3_MEDIA_UPLOAD_REGION=auto
      - LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minio}
      - LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-miniosecret}
      - LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT=http://localhost:9090
      - LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE=true
      - LANGFUSE_S3_MEDIA_UPLOAD_PREFIX=media/
      - LANGFUSE_S3_BATCH_EXPORT_ENABLED=false
      - LANGFUSE_S3_BATCH_EXPORT_BUCKET=langfuse
      - LANGFUSE_S3_BATCH_EXPORT_PREFIX=exports/
      - LANGFUSE_S3_BATCH_EXPORT_REGION=auto
      - LANGFUSE_S3_BATCH_EXPORT_ENDPOINT=http://minio:9000
      - LANGFUSE_S3_BATCH_EXPORT_EXTERNAL_ENDPOINT=http://localhost:9090
      - LANGFUSE_S3_BATCH_EXPORT_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minio}
      - LANGFUSE_S3_BATCH_EXPORT_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-miniosecret}
      - LANGFUSE_S3_BATCH_EXPORT_FORCE_PATH_STYLE=true
      - LANGFUSE_WORKER_HOST=langfuse-worker

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    container_name: bakery-os-langfuse-worker
    restart: always
    depends_on:
      db:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../.env
    environment: *langfuse-env

volumes:
  postgres_data:
  clickhouse_data:
  clickhouse_logs:
  redis_data:
