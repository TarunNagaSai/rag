services:
  db:
    image: pgvector/pgvector:pg17
    container_name: finance-rag
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bakeryuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bakerypass}
      POSTGRES_DB: ${POSTGRES_DB:-bakerydb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d
    ports:
      - "5434:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-bakeryuser} -d ${POSTGRES_DB:-bakerydb}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile
    container_name: finance-rag-backend
    restart: always
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-bakeryuser}:${POSTGRES_PASSWORD:-bakerypass}@db:5432/${POSTGRES_DB:-bakerydb}
    ports:
      - "0.0.0.0:8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../ui
      dockerfile: Dockerfile
    container_name: finance-rag-frontend
    restart: always
    environment:
      - API_URL=http://app:8000
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "0.0.0.0:3000:3000"
    depends_on:
      - app
    healthcheck:
      # node:slim ships without curl/wget; use Node's built-in fetch instead.
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
